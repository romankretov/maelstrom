name: maelstrom

# Production compose. Run on the VPS as `docker compose -f compose.prod.yml up -d`.
# Image tags are set by the deploy workflow via .env (IMAGE_TAG=<sha>).

services:
  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"
    volumes:
      - ./infra/caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    environment:
      CADDY_EMAIL: ${CADDY_EMAIL}
      MAELSTROM_DOMAIN: ${MAELSTROM_DOMAIN}
    depends_on:
      - api
      - web

  postgres:
    image: timescale/timescaledb:latest-pg16
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 10s
      timeout: 5s
      retries: 5
    logging:
      driver: json-file
      options: { max-size: "10m", max-file: "5" }

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes", "--maxmemory", "512mb", "--maxmemory-policy", "allkeys-lru"]
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    image: ghcr.io/romankretov/maelstrom-api:${IMAGE_TAG:-latest}
    restart: unless-stopped
    env_file: .env
    environment:
      MAELSTROM_ENV: production
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      REDIS_URL: redis://redis:6379/0
    depends_on:
      postgres: { condition: service_healthy }
      redis: { condition: service_healthy }
    # Mount the master key world-readable INSIDE the container — the host
    # file stays root-only 0400. Required because api/worker run as a
    # non-root user (Dockerfile creates `app`) and the default secret
    # permissions (0400 root:root) would block them.
    secrets:
      - source: master_key
        target: master_key
        mode: 0444
    logging:
      driver: json-file
      options: { max-size: "10m", max-file: "5" }

  worker:
    image: ghcr.io/romankretov/maelstrom-worker:${IMAGE_TAG:-latest}
    restart: unless-stopped
    env_file: .env
    environment:
      MAELSTROM_ENV: production
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      REDIS_URL: redis://redis:6379/0
    depends_on:
      postgres: { condition: service_healthy }
      redis: { condition: service_healthy }
    secrets:
      - source: master_key
        target: master_key
        mode: 0444
    logging:
      driver: json-file
      options: { max-size: "10m", max-file: "5" }

  web:
    image: ghcr.io/romankretov/maelstrom-web:${IMAGE_TAG:-latest}
    restart: unless-stopped
    environment:
      NEXT_PUBLIC_API_BASE_URL: https://${MAELSTROM_DOMAIN}/api
      NEXT_PUBLIC_WS_BASE_URL: wss://${MAELSTROM_DOMAIN}/ws
    depends_on:
      - api
    logging:
      driver: json-file
      options: { max-size: "10m", max-file: "5" }

  # One-shot migration runner. Run with: `docker compose run --rm migrate`.
  migrate:
    image: ghcr.io/romankretov/maelstrom-api:${IMAGE_TAG:-latest}
    env_file: .env
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
    depends_on:
      postgres: { condition: service_healthy }
    profiles: ["tools"]
    command: ["alembic", "upgrade", "head"]

volumes:
  pgdata:
  redisdata:
  caddy_data:
  caddy_config:

secrets:
  master_key:
    file: /etc/maelstrom/master.key
